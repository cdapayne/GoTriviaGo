<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Answer Screen</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="roomCodeDisplay" class="room-code" style="display:none;"></div>
  <div class="container">
    <div id="join" class="question-block">
      Room Code: <input id="room"><button id="joinBtn">Join</button>
    </div>
  </div>
  <div id="display" class="presentation" style="display:none;">
    <div id="catDisplay" class="category-tag" style="left:10px; right:auto;"></div>
    <div id="question" class="question-display"></div>
    <div id="progress" class="progress-container" style="display:none;"><div id="progressBar" class="progress-bar"></div></div>
    <div id="answers" class="answers-columns">
      <div class="column"><h2>Correct</h2><ul id="correctList" class="answers-list"></ul></div>
      <div class="column"><h2>Incorrect</h2><ul id="incorrectList" class="answers-list"></ul></div>
    </div>
    <div id="runGame" class="run-track" style="display:none;"></div>
    <div id="scorePanel" class="side-panel">
      <h3>Scores</h3>
      <ul id="scoreList"></ul>
    </div>
  </div>
  <div id="finalOverlay" class="final-overlay" style="display:none;">
    <div class="final-card">
      <div class="final-subtitle">Holiday Champions</div>
      <div id="winnerNames" class="winner-names"></div>
      <div id="finalScores" class="final-scores"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let roomCode = null;
    let playerCount = 0;
    let answered = 0;
    let progressInterval = null;
    let currentPlayers = [];
    const confettiColors = ['#e84351', '#ffb347', '#2fd56f', '#64d2ff', '#ffffff'];

    function blastConfetti(bursts = 120) {
      for (let i = 0; i < bursts; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.background = confettiColors[i % confettiColors.length];
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.animationDuration = '0.75s';
        piece.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 900);
      }
    }

    document.getElementById('joinBtn').onclick = () => {
      roomCode = document.getElementById('room').value.toUpperCase();
      socket.emit('viewerJoin', { roomCode });
      document.getElementById('join').style.display='none';
      document.getElementById('display').style.display='block';
      const rc = document.getElementById('roomCodeDisplay');
      rc.textContent = roomCode;
      rc.style.display = 'block';
    };

    socket.on('question', q => {
      document.getElementById('catDisplay').textContent = q.category;
      document.getElementById('catDisplay').style.display = 'block';
      const qEl = document.getElementById('question');
      qEl.textContent = q.text;
      qEl.style.display = 'block';
      document.getElementById('runGame').style.display = 'none';
      document.getElementById('answers').style.display = 'flex';
      document.getElementById('correctList').innerHTML='';
      document.getElementById('incorrectList').innerHTML='';
      answered = 0;
      // progress bar
      const prog = document.getElementById('progress');
      const bar = document.getElementById('progressBar');
      if (q.timeLimit) {
        prog.style.display='block';
        const end = q.startTime + q.timeLimit;
        clearInterval(progressInterval);
        progressInterval = setInterval(()=>{
          const remain = Math.max(0, end - Date.now());
          bar.style.width = (remain / q.timeLimit * 100) + '%';
          if (remain <= 0) clearInterval(progressInterval);
        },100);
      } else {
        prog.style.display='none';
      }
    });

    socket.on('playerAnswered', data => {
      const li = document.createElement('li');
      const secs = (data.time/1000).toFixed(2) + 's';
      li.textContent = data.name;
      const chip = document.createElement('span');
      chip.className='time-chip';
      chip.textContent=secs;
      li.appendChild(chip);
      li.className = data.correct ? 'correct' : 'incorrect';
      const target = data.correct ? 'correctList' : 'incorrectList';
      document.getElementById(target).appendChild(li);
      answered++;
      if (answered >= playerCount) {
        clearInterval(progressInterval);
      }
    });

    socket.on('scores', list => {
      playerCount = list.length;
      currentPlayers = list;
      const ul = document.getElementById('scoreList');
      ul.innerHTML = '';
      list.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s.name + ': ' + s.score;
        ul.appendChild(li);
      });
    });

    socket.on('miniGameStart', () => {
      document.getElementById('catDisplay').style.display = 'none';
      document.getElementById('question').style.display = 'none';
      document.getElementById('answers').style.display = 'none';
      document.getElementById('progress').style.display = 'none';
      const track = document.getElementById('runGame');
      track.innerHTML = '';
      currentPlayers.forEach(p => {
        const lane = document.createElement('div');
        lane.className = 'lane';
        lane.innerHTML = '<div class="lane-label">'+p.name+'</div><img src="/images/run.gif" class="runner" id="runner_'+p.id+'">';
        track.appendChild(lane);
      });
      track.style.display = 'block';
    });

    socket.on('miniGameEnd', ({ winner, replay }) => {
      const track = document.getElementById('runGame');
      const msg = document.createElement('div');
      msg.className = 'lane-label';
      msg.style.top = '10px';
      msg.textContent = winner ? (winner.name + ' wins!') : 'No winner';
      track.appendChild(msg);
      setTimeout(() => {
        track.innerHTML = '';
        replay.forEach(p => {
          const lane = document.createElement('div');
          lane.className = 'lane';
          lane.innerHTML = '<div class="lane-label">'+p.name+'</div><img src="/images/run.gif" class="runner" id="replay_'+p.id+'">';
          track.appendChild(lane);
        });
        const start = Date.now();
        const duration = 12000;
        function animate() {
          const elapsed = Date.now() - start;
          const pct = Math.min(elapsed / duration, 1);
          replay.forEach(p => {
            const runner = document.getElementById('replay_' + p.id);
            const finalPct = Math.min(p.taps, 100) / 100 * 75;
            runner.style.left = (pct * finalPct) + '%';
          });
          if (elapsed < duration) {
            requestAnimationFrame(animate);
          } else {
            setTimeout(() => {
              track.style.display = 'none';
              track.innerHTML = '';
              socket.emit('miniGameReplayFinished', { roomCode });
            }, 1000);
          }
        }
        animate();
      }, 2000);
    });

    socket.on('gameFinished', ({ scores, winners }) => {
      clearInterval(progressInterval);
      document.getElementById('display').style.display = 'none';
      const overlay = document.getElementById('finalOverlay');
      const winnerNames = document.getElementById('winnerNames');
      const finalScores = document.getElementById('finalScores');
      winnerNames.innerHTML = winners.map(w => `<span class="winner-chip">${w.name}</span>`).join('');
      const list = scores.slice(0, 10).map((s, idx) => `<div class="final-row"><span class="rank">#${idx + 1}</span><span class="name">${s.name}</span><span class="score">${s.score} pts</span></div>`).join('');
      finalScores.innerHTML = `<div class="final-list">${list || '<div class="final-row">No scores yet.</div>'}</div>`;
      overlay.style.display = 'flex';
      blastConfetti(160);
      setTimeout(() => blastConfetti(120), 400);
    });

    socket.on('roomClosed', () => {
      alert('Room closed');
    });
  </script>
</body>
</html>

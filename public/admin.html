<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Admin</h1>
    <button id="createRoom">Create Room</button>
    <div id="roomInfo"></div>
    <div id="setup" style="display:none;">
      <h2>Setup Categories and Questions</h2>
      <div id="aiSetup" class="question-block">
        <input id="apiKey" placeholder="OpenAI API Key">
        <textarea id="prompt" placeholder="Describe the trivia you want"></textarea>
        <button id="generate">Generate Questions</button>
      </div>
      <div id="categories"></div>
      <button id="saveSetup">Save Setup</button>
      <button id="startQuestion">Start Question</button>
    </div>
    <div>
      <h3>Players:</h3>
      <ul id="players"></ul>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let roomCode = null;
    let generatedData = null;

    document.getElementById('createRoom').onclick = () => {
      socket.emit('adminCreateRoom');
    };

    socket.on('roomCreated', code => {
      roomCode = code;
      document.getElementById('roomInfo').textContent = 'Room Code: ' + code;
      document.getElementById('setup').style.display = 'block';
      buildForm();
    });

    function buildForm(){
      generatedData = null;
      const categoriesDiv = document.getElementById('categories');
      categoriesDiv.innerHTML = '';
      for (let c=0;c<4;c++){
        const catDiv = document.createElement('div');
        catDiv.className = 'question-block';
        catDiv.innerHTML = '<h3>Category '+(c+1)+'</h3><input placeholder="Category name"><div class="qs"></div>';
        const qsDiv = catDiv.querySelector('.qs');
        for (let q=0;q<5;q++){
          const qDiv = document.createElement('div');
          qDiv.className='question-block';
          qDiv.innerHTML = 'Question: <input class="qtext"><br>Option A:<input class="opt" data-idx="0"><br>Option B:<input class="opt" data-idx="1"><br>Option C:<input class="opt" data-idx="2"><br>Option D:<input class="opt" data-idx="3"><br>Correct:<select class="correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>';
          qsDiv.appendChild(qDiv);
        }
        categoriesDiv.appendChild(catDiv);
      }
    }

    document.getElementById('saveSetup').onclick = () => {
      let categories = [];
      if (generatedData) {
        categories = generatedData;
      } else {
        const cats = document.getElementById('categories').children;
        for (let i=0;i<cats.length;i++){
          const nameInput = cats[i].querySelector('input');
          const name = nameInput && nameInput.value ? nameInput.value : 'Category '+(i+1);
          const qs = [];
          const qDivs = cats[i].querySelectorAll('.qs .question-block');
          qDivs.forEach(div => {
            const text = div.querySelector('.qtext').value;
            const opts = Array.from(div.querySelectorAll('.opt')).map(i=>i.value);
            const ans = parseInt(div.querySelector('.correct').value,10);
            qs.push({ text, options: opts, answer: ans });
          });
          categories.push({ name, questions: qs });
        }
      }
      socket.emit('adminSetup', { roomCode, categories });
    };

    document.getElementById('startQuestion').onclick = () => {
      socket.emit('adminStartQuestion', { roomCode });
    };

    document.getElementById('generate').onclick = () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      if (!apiKey || !prompt) {
        alert('API key and prompt required');
        return;
      }
      socket.emit('adminGenerate', { roomCode, apiKey, prompt });
    };

    socket.on('generatedQuestions', data => {
      generatedData = data;
      const categoriesDiv = document.getElementById('categories');
      categoriesDiv.innerHTML = '';
      data.forEach(cat => {
        const catDiv = document.createElement('div');
        catDiv.className = 'question-block';
        catDiv.innerHTML = '<h3>'+cat.name+'</h3>';
        cat.questions.forEach(q => {
          const qDiv = document.createElement('div');
          qDiv.className = 'question-block';
          qDiv.innerHTML = '<strong>'+q.text+'</strong><ul>' + q.options.map((o,i)=>'<li'+(i===q.answer?' class="correct"':'')+'>'+o+'</li>').join('') + '</ul>';
          catDiv.appendChild(qDiv);
        });
        categoriesDiv.appendChild(catDiv);
      });
    });

    socket.on('generationError', msg => {
      alert('Generation failed: ' + msg);
    });

    socket.on('players', list => {
      const ul = document.getElementById('players');
      ul.innerHTML = '';
      list.forEach(n => {
        const li = document.createElement('li');
        li.textContent = n;
        ul.appendChild(li);
      });
    });

    socket.on('roomClosed', () => {
      alert('Room closed');
    });
  </script>
</body>
</html>

    <button id="createRoom">Create Room</button>

      <div id="openTrivia" class="question-block">
        <h3>Fetch from Open Trivia DB</h3>
        <label>Number of questions <input id="openAmount" type="number" min="1" max="100" value="10"></label>
        <label>Difficulty
          <select id="openDifficulty">
            <option value="any">Any</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <label>Category

        </label>
        <label>Topic (keyword filter)<input id="openTopic" placeholder="e.g. Christmas, sports, history"></label>
        <button id="fetchOpenTrivia">Fetch Trivia</button>
        <button id="loadHolidayPack" type="button">Load Holiday Pack</button>
        <button id="loadMegaHolidayPack" type="button">Load 50 Christmas Pack</button>
        <div id="openStatus" class="hint"></div>
      </div>
      <div id="aiSetup" class="question-block">

      </div>

      <div>
        <button id="saveSetup">Save Setup</button>

      </div>
      <label><input type="checkbox" id="randomize"> Randomize answers</label>
      <label><input type="checkbox" id="includeRunGame"> Include Run Game (disabled for now)</label>
      <input id="timeLimit" type="number" placeholder="Time limit (seconds)" value="15" min="1">
      <button id="nextQuestion" style="display:none;">Start Question</button>
    </div>
    <div>
      <h3>Players:</h3>
      <ul id="players"></ul>
      <button id="toggleScores" style="display:none;">Toggle Scores</button>
    </div>
  </div>
  <div id="scorePanel" class="side-panel" style="display:none;">
    <h3>Scores</h3>

    <ul id="scoreList"></ul>

    document.getElementById('createRoom').onclick = () => {
      socket.emit('adminCreateRoom');
    };

    const categorySelect = document.getElementById('openCategory');
    openCategories.forEach(cat => {

      opt.value = cat.id;
      opt.textContent = cat.name;
      categorySelect.appendChild(opt);
    });

    socket.on('roomCreated', code => {
      roomCode = code;
      document.getElementById('roomInfo').textContent = 'Room Code: ' + code;
      const rc = document.getElementById('roomCodeDisplay');
      rc.textContent = code;
      rc.style.display = 'block';
      document.getElementById('setup').style.display = 'block';
      document.getElementById('scorePanel').style.display = 'block';
      document.getElementById('toggleScores').style.display = 'block';
      buildForm();
      refreshSaved();

    function buildForm(){
      generatedData = null;
      const categoriesDiv = document.getElementById('categories');
      categoriesDiv.innerHTML = '';
      for (let c=0;c<4;c++){
        const catDiv = document.createElement('div');
        catDiv.className = 'question-block';
        catDiv.innerHTML = '<h3>Category '+(c+1)+'</h3><input placeholder="Category name"><div class="qs"></div>';
        const qsDiv = catDiv.querySelector('.qs');
        for (let q=0;q<5;q++){
          const qDiv = document.createElement('div');
          qDiv.className='question-block';
          qDiv.innerHTML = 'Question: <input class="qtext"><br>Option A:<input class="opt" data-idx="0"><br>Option B:<input class="opt" data-idx="1"><br>Option C:<input class="opt" data-idx="2"><br>Option D:<input class="opt" data-idx="3"><br>Correct:<select class="correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>';
          qsDiv.appendChild(qDiv);
        }
      categoriesDiv.appendChild(catDiv);
      }
    }

    function renderEditable(data) {
      const categoriesDiv = document.getElementById('categories');
      categoriesDiv.innerHTML = '';
      data.forEach((cat, ci) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'question-block';
        catDiv.innerHTML = '<h3>'+cat.name+'</h3>';
        cat.questions.forEach((q, qi) => {
          const qDiv = document.createElement('div');
          qDiv.className = 'question-block';
          qDiv.innerHTML = '<strong>'+q.text+'</strong> <button class="editQ">Edit</button><ul>' + q.options.map((o,i)=>'<li'+(i===q.answer?' class="correct"':'')+'>'+o+'</li>').join('') + '</ul>';
          qDiv.querySelector('.editQ').onclick = () => {
            qDiv.innerHTML = 'Question: <input class="qtext" value="'+q.text+'"><br>' +
              q.options.map((o,i)=>'Option '+String.fromCharCode(65+i)+':<input class="opt" data-idx="'+i+'" value="'+o+'"><br>').join('') +
              'Correct:<select class="correct">'+ q.options.map((o,i)=>'<option value="'+i+'"'+(i===q.answer?' selected':'')+'>'+String.fromCharCode(65+i)+'</option>').join('') + '</select><br><button class="saveQ">Save</button>';
            qDiv.querySelector('.saveQ').onclick = () => {
              q.text = qDiv.querySelector('.qtext').value;
              q.options = Array.from(qDiv.querySelectorAll('.opt')).map(i=>i.value);
              q.answer = parseInt(qDiv.querySelector('.correct').value,10);
              renderEditable(data);
              socket.emit('adminSetup', { roomCode, categories: data, runGame: document.getElementById('includeRunGame').checked });
            };
          };
          catDiv.appendChild(qDiv);
        });
        categoriesDiv.appendChild(catDiv);
      });
    }

    document.getElementById('saveSetup').onclick = () => {
      let categories = [];
      if (generatedData) {
        categories = generatedData;
      } else {
        const cats = document.getElementById('categories').children;
        for (let i=0;i<cats.length;i++){
          const nameInput = cats[i].querySelector('input');
          const name = nameInput && nameInput.value ? nameInput.value : 'Category '+(i+1);
          const qs = [];
          const qDivs = cats[i].querySelectorAll('.qs .question-block');
          qDivs.forEach(div => {
            const text = div.querySelector('.qtext').value;
            const opts = Array.from(div.querySelectorAll('.opt')).map(i=>i.value);
            const ans = parseInt(div.querySelector('.correct').value,10);
            qs.push({ text, options: opts, answer: ans });
          });
          categories.push({ name, questions: qs });
        }
      }
      const runGame = document.getElementById('includeRunGame').checked;
      socket.emit('adminSetup', { roomCode, categories, runGame: false });
      const name = prompt('Name this setup');
      if (name) {
        localStorage.setItem('setup_' + name, JSON.stringify({ categories, runGame }));
        refreshSaved();
      }
      const btn = document.getElementById('nextQuestion');
      btn.textContent = 'Start Question';
      btn.style.display = 'block';
    };

    document.getElementById('nextQuestion').onclick = () => {
      const randomize = document.getElementById('randomize').checked;
      const tl = parseInt(document.getElementById('timeLimit').value, 10);
      socket.emit('adminStartQuestion', { roomCode, randomize, timeLimit: isNaN(tl) ? 15 : tl });
      document.getElementById('nextQuestion').style.display = 'none';
    };

    document.getElementById('generate').onclick = () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      if (!apiKey || !prompt) {
        alert('API key and prompt required');
        return;
      }
      socket.emit('adminGenerate', { roomCode, apiKey, prompt });
    };

    socket.on('generatedQuestions', data => {
      generatedData = data;
      renderEditable(generatedData);
    });

    socket.on('generationError', msg => {
      alert('Generation failed: ' + msg);
    });

    function decodeHTMLEntities(str) {
      const txt = document.createElement('textarea');
      txt.innerHTML = str;
      return txt.value;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    document.getElementById('loadHolidayPack').onclick = () => {
      generatedData = JSON.parse(JSON.stringify(holidayPack));
      renderEditable(generatedData);
      document.getElementById('openStatus').textContent = 'Loaded Holiday Pack. Review, tweak, then "Save Setup" to approve.';
    };

    document.getElementById('loadMegaHolidayPack').onclick = () => {
      generatedData = JSON.parse(JSON.stringify(megaHolidayPack));
      renderEditable(generatedData);
      document.getElementById('openStatus').textContent = 'Loaded 50-question Christmas Pack. Review, tweak, then "Save Setup" to approve.';
    };

    document.getElementById('fetchOpenTrivia').onclick = async () => {
      const amount = parseInt(document.getElementById('openAmount').value, 10);
      const status = document.getElementById('openStatus');
      const difficulty = document.getElementById('openDifficulty').value;
      const category = document.getElementById('openCategory').value;
      const topic = document.getElementById('openTopic').value.trim().toLowerCase();
      if (isNaN(amount) || amount < 1) {
        alert('Please enter how many questions to fetch.');
        return;
      }
      status.textContent = 'Loading questions...';
      try {
        let url = `https://opentdb.com/api.php?amount=${amount}&type=multiple`;
        if (difficulty !== 'any') url += `&difficulty=${difficulty}`;
        if (category) url += `&category=${category}`;
        const res = await fetch(url);
        const data = await res.json();
        let results = data.results || [];
        if (!results.length) {
          throw new Error('No questions returned from Open Trivia DB');
        }
        if (topic) {
          const filtered = results.filter(item => {
            const haystack = `${item.category} ${item.question} ${item.correct_answer} ${item.incorrect_answers.join(' ')}`.toLowerCase();
            return haystack.includes(topic);
          });
          if (filtered.length) results = filtered;
        }
        const grouped = {};
        results.forEach(item => {
          const catName = decodeHTMLEntities(item.category || 'Trivia');
          if (!grouped[catName]) grouped[catName] = [];
          const decodedIncorrect = item.incorrect_answers.map(decodeHTMLEntities);
          const correct = decodeHTMLEntities(item.correct_answer);
          const options = shuffle([...decodedIncorrect, correct]);
          const answer = options.indexOf(correct);
          grouped[catName].push({
            text: decodeHTMLEntities(item.question),
            options,
            answer
          });
        });
        const categories = Object.entries(grouped).map(([name, questions]) => ({
          name,
          questions
        }));
        generatedData = categories;
        renderEditable(generatedData);
        const filteredNote = topic ? ` Filtered to ${results.length} matching "${topic}".` : '';
        status.textContent = `Fetched ${results.length} questions.${filteredNote} Review, edit if needed, then click "Save Setup" to approve.`;
      } catch (err) {
        status.textContent = 'Failed to load trivia: ' + err.message;
      }
    };

    function refreshSaved() {
      const sel = document.getElementById('savedSetups');
      sel.innerHTML = '<option value="">Load Setup</option>';
      for (let i=0;i<localStorage.length;i++) {
        const key = localStorage.key(i);
        if (key.startsWith('setup_')) {
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = key.substring(6);
          sel.appendChild(opt);
        }
      }
    }

    document.getElementById('savedSetups').onchange = e => {
      const key = e.target.value;
      if (!key) return;
      const saved = JSON.parse(localStorage.getItem(key));
      const cats = saved.categories || saved;
      generatedData = cats;
      document.getElementById('includeRunGame').checked = saved.runGame !== false;
      renderEditable(generatedData);
      socket.emit('adminSetup', { roomCode, categories: cats, runGame: false });
      const btn = document.getElementById('nextQuestion');
      btn.textContent = 'Start Question';
      btn.style.display = 'block';
    };

    document.getElementById('toggleScores').onclick = () => {
      document.getElementById('scorePanel').classList.toggle('collapsed');
    };

      const ul = document.getElementById('players');
      ul.innerHTML = '';
      list.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p.name + ' ';
        const btn = document.createElement('button');
        btn.textContent = 'Remove';
        btn.onclick = () => socket.emit('adminRemovePlayer', { roomCode, playerId: p.id });
        li.appendChild(btn);
        ul.appendChild(li);
      });
    });

    socket.on('scores', list => {
      const ul = document.getElementById('scoreList');
      ul.innerHTML = '';
      list.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s.name + ': ' + s.score;
        ul.appendChild(li);
      });
      document.getElementById('leader').textContent = list.length ? ('Leader: ' + list[0].name) : '';
    });
    socket.on('roomClosed', () => {
      alert('Room closed');
    });
  </script>
</body>
</html>

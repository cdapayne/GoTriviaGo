<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Player</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="roomCodeDisplay" class="room-code" style="display:none;"></div>
  <div id="playerScore" class="player-score" style="display:none;"></div>
  <div id="submittedMsg" class="submitted-msg" style="display:none;">Question has been submitted.</div>
  <div class="container">
    <div id="join" class="question-block">
      Room Code: <input id="room"><br>
      Name: <input id="name"><br>
      <button id="joinBtn">Join</button>
    </div>
    <div id="game" style="display:none; position:relative; padding-top:60px;">
      <div id="category" class="category-tag" style="left:10px; right:auto; position:fixed; display:none;"></div>
      <div id="question" class="question-block question-display"></div>
      <div id="progress" class="progress-container" style="display:none;"><div id="progressBar" class="progress-bar"></div></div>
      <div id="options" class="options-list" style="display:none;"></div>
    </div>
    <button id="buzz" class="buzz-btn">Buzz!</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let roomCode = null;
    let selectedAnswer = null;
    let progressInterval = null;

    socket.on('scores', list => {
      const me = list.find(s => s.id === socket.id);
      if (me) {
        const sd = document.getElementById('playerScore');
        sd.textContent = 'Score: ' + me.score;
        sd.style.display = 'block';
      }
    });

    document.getElementById('joinBtn').onclick = () => {
      roomCode = document.getElementById('room').value.toUpperCase();
      const name = document.getElementById('name').value;
      socket.emit('playerJoin', { roomCode, name });
    };

    socket.on('joined', code => {
      document.getElementById('join').style.display='none';
      document.getElementById('game').style.display='block';
      const rc = document.getElementById('roomCodeDisplay');
      rc.textContent = code;
      rc.style.display = 'block';
    });

    socket.on('question', q => {
      selectedAnswer = null;
      const cat = document.getElementById('category');
      cat.textContent = q.category;
      cat.style.display = 'block';
      document.getElementById('question').textContent = q.text;
      document.getElementById('submittedMsg').style.display = 'none';
      const optsDiv = document.getElementById('options');
      optsDiv.style.display='none';
      optsDiv.innerHTML='';
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.className='option';
        btn.onclick = () => {
          document.querySelectorAll('#options .option').forEach(b=>b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedAnswer = idx;
          const buzz = document.getElementById('buzz');
          buzz.disabled = false;
        };
        optsDiv.appendChild(btn);
      });
      const buzz = document.getElementById('buzz');
      buzz.textContent = 'Buzz!';
      buzz.dataset.mode = 'buzz';
      buzz.style.display = 'block';
      buzz.disabled = false;
      const prog = document.getElementById('progress');
      const bar = document.getElementById('progressBar');
      if (q.timeLimit) {
        prog.style.display='block';
        const end = q.startTime + q.timeLimit;
        clearInterval(progressInterval);
        progressInterval = setInterval(()=>{
          const remain = Math.max(0, end - Date.now());
          bar.style.width = (remain / q.timeLimit * 100) + '%';
          if (remain <= 0) clearInterval(progressInterval);
        },100);
      } else {
        prog.style.display='none';
      }
    });

    document.getElementById('buzz').onclick = () => {
      const btn = document.getElementById('buzz');
      if (btn.dataset.mode === 'buzz') {
        socket.emit('playerBuzz', { roomCode });
      } else if (btn.dataset.mode === 'submit' && selectedAnswer !== null) {
        socket.emit('playerAnswer', { roomCode, answer: selectedAnswer });
        document.getElementById('options').style.display='none';
        btn.style.display='none';
        document.getElementById('submittedMsg').style.display = 'block';
      }
    };

    socket.on('buzzAccepted', () => {
      const buzz = document.getElementById('buzz');
      buzz.textContent = 'Submit';
      buzz.dataset.mode = 'submit';
      buzz.disabled = true;
      document.getElementById('options').style.display='block';
    });

    socket.on('removed', () => {
      alert('You have been removed from the room');
      location.reload();
    });

    socket.on('roomClosed', () => {
      alert('Room closed');
    });
  </script>
</body>
</html>
